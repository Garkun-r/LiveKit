  - "алло"
  - "здравствуйте"
  - "здрасте"
  - "кто вы"
  - "да да"
  - "соединить"

whole_word:
  - "оператор"

partial:
  - "операт"
  - "да соед"
  - "менедж"
  - "специалистом"
